services:
  api:
    build:
      context: .
      target: production
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    env_file: .env
    environment:
      YOLO_CONFIG_DIR: /tmp
      OPENCV_FFMPEG_CAPTURE_OPTIONS: ${OPENCV_FFMPEG_CAPTURE_OPTIONS:-rtsp_transport;tcp|fflags;nobuffer|flags;low_delay|max_delay;0}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/service/storage
      # Opsional: aktifkan mount NAS/offsite dan set DR_OFFSITE_PATH=/offsite/cctv.
      # - /mnt/cctv-backup:/offsite/cctv
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')"]
      interval: 10s
      timeout: 15s
      retries: 8
      start_period: 60s
    stop_grace_period: 45s
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    environment:
      VITE_API_BASE_URL: ${DASHBOARD_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:1.18.2
    profiles: ["webcam"]
    ports:
      - "8554:8554"
      - "8889:8889"
    restart: unless-stopped

volumes:
  postgres_data:
